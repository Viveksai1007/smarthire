{% extends 'base.html' %}

{% block content %}

<h2>Create Job</h2>

<div class="row">
    <div class="col-md-8">

        <div class="card shadow">
            <div class="card-body">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        {{ form.title }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        {{ form.description }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Skills Required</label>
                        {{ form.skills_required }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        {{ form.location }}
                    </div>

                    <button type="submit" class="btn btn-success">
                        Post Job
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
