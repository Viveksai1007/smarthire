{% extends 'base.html' %}

{% block content %}

<h3>Upload Resume for {{ job.title }}</h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <input type="file" name="resume" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">
        Submit Application
    </button>
</form>

{% endblock %}
