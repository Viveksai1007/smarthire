<!DOCTYPE html>
<html>
<head>
    <title>SmartHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="{% url 'job_list' %}">SmartHire</a>

        <div class="ms-auto">

            {% if user.is_authenticated %}

                <span class="text-white me-3">
                    Welcome, {{ user.username }}
                </span>

               <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
    Logout
</a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">
                    Login
                </a>

                <a href="{% url 'register' %}" class="btn btn-primary btn-sm">
                    Register
                </a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container mt-4">

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
